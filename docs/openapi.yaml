openapi: 3.0.3

info:
  title: myLineage API
  description: |
    RESTful API for myLineage — a multi-tenant genealogy SaaS platform compatible with GEDCOM 7.

    ## Authentication
    All endpoints except `/api/auth/*` and `/api/invitations/by-token/{token}` require a
    valid JWT access token passed as a Bearer token in the `Authorization` header.

    Access tokens are short-lived (15 min). Use `POST /api/auth/refresh` with a refresh
    token to obtain a new access token.

    ## Role model
    Tree operations enforce a 4-level role hierarchy per tree:
    - **owner** — full control, can invite members and delete the tree
    - **writer** — can create, update and delete genealogy records
    - **reader** — read-only access to genealogy records
    - **admin** — platform administrator; bypasses tree-level restrictions
  version: 2.0.0
  contact:
    name: Miguel Bangueses
    url: https://github.com/mbangas/myLineage

servers:
  - url: http://localhost:3000
    description: Local development
  - url: http://{host}:3000
    description: Self-hosted
    variables:
      host:
        default: localhost
        description: Hostname or IP of the server

tags:
  - name: Auth
    description: Registration, login, TOTP 2FA and token management
  - name: Profile
    description: Current user profile management
  - name: Trees
    description: Tree CRUD and member management
  - name: Genealogy
    description: Tree-scoped genealogy record CRUD (individuals, families, sources, etc.)
  - name: GEDCOM
    description: GEDCOM 7 import and export
  - name: Invitations
    description: Tree membership invitations
  - name: Notifications
    description: In-app notifications
  - name: Admin
    description: Platform administration (requires admin role)
  - name: System
    description: System information

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable schemas
  # -------------------------------------------------------------------------
  schemas:

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: Credenciais inválidas

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 52024332-9218-4563-9acf-572afa872d30
        email:
          type: string
          format: email
          example: miguel.bangueses@gmail.com
        name:
          type: string
          example: Miguel Bangueses
        isAdmin:
          type: boolean
          example: false
        totpEnabled:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthResponse:
      allOf:
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
        - $ref: '#/components/schemas/TokenPair'

    Tree:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c90fe98f-7064-4055-9713-fa0f828d9088
        name:
          type: string
          example: Família Bangueses
        description:
          type: string
          example: Árvore genealógica da família Bangueses
        ownerId:
          type: string
          format: uuid
          example: 52024332-9218-4563-9acf-572afa872d30
        role:
          type: string
          enum: [owner, writer, reader, admin]
          example: owner
        memberCount:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TreeMember:
      type: object
      properties:
        userId:
          type: string
          format: uuid
          example: 52024332-9218-4563-9acf-572afa872d30
        email:
          type: string
          format: email
          example: miguel.bangueses@gmail.com
        name:
          type: string
          example: Miguel Bangueses
        role:
          type: string
          enum: [owner, writer, reader]
          example: writer
        joinedAt:
          type: string
          format: date-time

    IndividualName:
      type: object
      properties:
        value:
          type: string
          example: João /Silva/
        type:
          type: string
          example: birth
        given:
          type: string
          example: João
        surname:
          type: string
          example: Silva

    GedcomEvent:
      type: object
      properties:
        tag:
          type: string
          example: BIRT
        date:
          type: string
          example: 15 MAR 1950
        place:
          type: string
          example: Lisboa, Portugal
        notes:
          type: array
          items:
            type: string

    Individual:
      type: object
      properties:
        id:
          type: string
          example: I1
        type:
          type: string
          enum: [INDI]
          example: INDI
        names:
          type: array
          items:
            $ref: '#/components/schemas/IndividualName'
        sex:
          type: string
          enum: [M, F, U, X]
          example: M
        events:
          type: array
          items:
            $ref: '#/components/schemas/GedcomEvent'
        attributes:
          type: array
          items:
            type: object
        famc:
          type: string
          nullable: true
          example: F1
        fams:
          type: array
          items:
            type: string
          example: [F2]
        notes:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          items:
            type: string
        multimediaRefs:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Family:
      type: object
      properties:
        id:
          type: string
          example: F1
        type:
          type: string
          enum: [FAM]
        husb:
          type: string
          nullable: true
          example: I1
        wife:
          type: string
          nullable: true
          example: I2
        children:
          type: array
          items:
            type: string
          example: [I3, I4]
        events:
          type: array
          items:
            $ref: '#/components/schemas/GedcomEvent'
        notes:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          items:
            type: string
        multimediaRefs:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Source:
      type: object
      properties:
        id:
          type: string
          example: S1
        type:
          type: string
          enum: [SOUR]
        title:
          type: string
          example: Registo de Nascimento
        author:
          type: string
          example: Conservatória do Registo Civil
        publication:
          type: string
          example: 1950
        abbreviation:
          type: string
          example: Reg. Nasc.
        text:
          type: string
        repositoryRef:
          type: string
          nullable: true
          example: R1
        callNumber:
          type: string
        notes:
          type: array
          items:
            type: string
        multimediaRefs:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Repository:
      type: object
      properties:
        id:
          type: string
          example: R1
        type:
          type: string
          enum: [REPO]
        name:
          type: string
          example: Arquivo Nacional Torre do Tombo
        address:
          type: object
          properties:
            addr:
              type: string
            city:
              type: string
              example: Lisboa
            state:
              type: string
            postal:
              type: string
            country:
              type: string
              example: Portugal
        phone:
          type: string
        email:
          type: string
          format: email
        web:
          type: string
          format: uri
        notes:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MultimediaFile:
      type: object
      properties:
        file:
          type: string
          description: Relative URL or absolute URI to the file
          example: /uploads/c90fe98f-7064-4055-9713-fa0f828d9088/fotos/abc123.jpg
        form:
          type: string
          example: jpeg
        title:
          type: string
          example: João Silva em 1975

    Multimedia:
      type: object
      properties:
        id:
          type: string
          example: M1
        type:
          type: string
          enum: [OBJE]
        files:
          type: array
          items:
            $ref: '#/components/schemas/MultimediaFile'
        notes:
          type: array
          items:
            type: string
        sourceRefs:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
          example: [family, 1975]
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Note:
      type: object
      properties:
        id:
          type: string
          example: N1
        type:
          type: string
          enum: [NOTE]
        text:
          type: string
          example: Emigrou para o Brasil em 1920.
        sourceRefs:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Submitter:
      type: object
      properties:
        id:
          type: string
          example: SUBM1
        type:
          type: string
          enum: [SUBM]
        name:
          type: string
          example: Miguel Bangueses
        address:
          type: object
          properties:
            addr:
              type: string
            city:
              type: string
            state:
              type: string
            postal:
              type: string
            country:
              type: string
        phone:
          type: string
        email:
          type: string
          format: email
        web:
          type: string
          format: uri
        language:
          type: string
          example: Portuguese
        notes:
          type: array
          items:
            type: string
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TreeStats:
      type: object
      properties:
        individuals:
          type: integer
          example: 342
        families:
          type: integer
          example: 148
        sources:
          type: integer
          example: 56
        multimedia:
          type: integer
          example: 120
        notes:
          type: integer
          example: 78
        repositories:
          type: integer
          example: 4
        submitters:
          type: integer
          example: 1

    Invitation:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        treeId:
          type: string
          format: uuid
          example: c90fe98f-7064-4055-9713-fa0f828d9088
        treeName:
          type: string
          example: Família Bangueses
        inviterName:
          type: string
          example: Miguel Bangueses
        inviteeEmail:
          type: string
          format: email
          example: ana.silva@gmail.com
        role:
          type: string
          enum: [writer, reader]
          example: reader
        status:
          type: string
          enum: [pending, accepted, declined, expired]
          example: pending
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        respondedAt:
          type: string
          format: date-time
          nullable: true

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: invitation
        data:
          type: object
          additionalProperties: true
          example:
            invitationId: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            treeId: c90fe98f-7064-4055-9713-fa0f828d9088
            treeName: Família Bangueses
            inviterName: Miguel Bangueses
            role: reader
        read:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time

    UploadResponse:
      type: object
      properties:
        url:
          type: string
          example: /uploads/c90fe98f-7064-4055-9713-fa0f828d9088/fotos/abc123def456.jpg
        filename:
          type: string
          example: abc123def456.jpg
        size:
          type: integer
          example: 245890

# ---------------------------------------------------------------------------
# Reusable parameters
# ---------------------------------------------------------------------------
  parameters:
    treeId:
      name: treeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: c90fe98f-7064-4055-9713-fa0f828d9088
    entityId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: I1
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    invitationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    notificationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    includeDeleted:
      name: includeDeleted
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: Include soft-deleted records in the response
    paginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    paginationOffset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

# ===========================================================================
# Paths
# ===========================================================================
paths:

  # ── System ────────────────────────────────────────────────────────────────

  /api/info:
    get:
      tags: [System]
      summary: Server info
      description: Returns version, database type, container info, CPU/RAM stats, and last 30 log lines.
      operationId: getInfo
      responses:
        '200':
          description: Server info
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: 2.0.0
                  platform:
                    type: string
                    example: myLineage
                  database:
                    type: string
                    enum: [PostgreSQL, JSON (file)]
                    example: PostgreSQL
                  ip:
                    type: string
                    example: 192.168.1.100
                  container:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      os:
                        type: string
                      created:
                        type: string
                        format: date-time
                      internalIp:
                        type: string
                      cpu:
                        type: string
                      ram:
                        type: string
                      image:
                        type: string
                      logs:
                        type: string

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: joao.silva@gmail.com
                password:
                  type: string
                  minLength: 8
                  example: Segur0!2026
                name:
                  type: string
                  example: João Silva
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields or password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Returns tokens on success, or a `requires2FA` flag when 2FA is needed.
        - If `totpPending: true` — proceed to `POST /api/auth/login/totp`
        - If `totpSetupRequired: true` — admin must set up TOTP first via `POST /api/auth/totp/setup`
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: joao.silva@gmail.com
                password:
                  type: string
                  example: Segur0!2026
      responses:
        '200':
          description: Successful login or 2FA challenge
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - type: object
                    description: TOTP required — proceed to /login/totp
                    properties:
                      requires2FA:
                        type: boolean
                        example: true
                      totpPending:
                        type: boolean
                        example: true
                      userId:
                        type: string
                        format: uuid
                  - type: object
                    description: Admin must set up TOTP before continuing
                    properties:
                      requires2FA:
                        type: boolean
                        example: true
                      totpSetupRequired:
                        type: boolean
                        example: true
                      userId:
                        type: string
                        format: uuid
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/auth/login/totp:
    post:
      tags: [Auth]
      summary: Complete login with TOTP code
      operationId: loginTotp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, code]
              properties:
                userId:
                  type: string
                  format: uuid
                  example: 52024332-9218-4563-9acf-572afa872d30
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "482031"
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid TOTP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          description: Missing refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (stateless — client discards tokens)
      operationId: logout
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /api/auth/me:
    get:
      tags: [Profile]
      summary: Get current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Profile]
      summary: Update name or email
      operationId: updateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: João Manuel Silva
                email:
                  type: string
                  format: email
                  example: joao.manuel@gmail.com
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Nothing to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/me/password:
    put:
      tags: [Profile]
      summary: Change password
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  example: Segur0!2026
                newPassword:
                  type: string
                  minLength: 8
                  example: N0v4P@ss!
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Missing fields or new password too short
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/totp/setup:
    post:
      tags: [Auth]
      summary: Generate TOTP secret and QR code URI
      description: |
        Accepts either a Bearer token (authenticated user) or a `userId` in the request
        body (admin first-time setup flow before full authentication).
      operationId: totpSetup
      security:
        - {}
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  description: Required when not using Bearer token
      responses:
        '200':
          description: TOTP secret and OTP Auth URI
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    example: JBSWY3DPEHPK3PXP
                  uri:
                    type: string
                    example: "otpauth://totp/myLineage:joao@gmail.com?secret=JBSWY3DPEHPK3PXP&issuer=myLineage&algorithm=SHA1&digits=6&period=30"
        '400':
          description: userId missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/auth/totp/verify:
    post:
      tags: [Auth]
      summary: Verify TOTP code and enable 2FA
      operationId: totpVerify
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
