              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Genealogy]
      summary: Soft-delete a note
      operationId: deleteNote
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/trees/{treeId}/submitters:
    parameters:
      - $ref: '#/components/parameters/treeId'
      - $ref: '#/components/parameters/includeDeleted'
    get:
      tags: [Genealogy]
      summary: List submitters
      operationId: listSubmitters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of submitters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Submitter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Genealogy]
      summary: Create a submitter
      operationId: createSubmitter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Submitter'
      responses:
        '201':
          description: Submitter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submitter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/trees/{treeId}/submitters/{id}:
    parameters:
      - $ref: '#/components/parameters/treeId'
      - $ref: '#/components/parameters/entityId'
    get:
      tags: [Genealogy]
      summary: Get a submitter by ID
      operationId: getSubmitter
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Submitter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submitter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Genealogy]
      summary: Update a submitter
      operationId: updateSubmitter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Submitter'
      responses:
        '200':
          description: Updated submitter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submitter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Genealogy]
      summary: Soft-delete a submitter
      operationId: deleteSubmitter
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Tree utilities ─────────────────────────────────────────────────────────

  /api/trees/{treeId}/stats:
    parameters:
      - $ref: '#/components/parameters/treeId'
    get:
      tags: [Genealogy]
      summary: Get tree statistics
      operationId: getTreeStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics per collection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/trees/{treeId}/upload:
    parameters:
      - $ref: '#/components/parameters/treeId'
    post:
      tags: [Genealogy]
      summary: Upload a photo or image file
      description: |
        Accepts JPEG, PNG, GIF, WebP or BMP. Maximum size: 10 MB.
        Requires writer or owner role.
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '400':
          description: No file or invalid type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: File exceeds 10 MB limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trees/{treeId}/bulk-replace:
    parameters:
      - $ref: '#/components/parameters/treeId'
    post:
      tags: [Genealogy]
      summary: Bulk replace one or more collections
      description: |
        Replaces entire collections atomically. Used during GEDCOM import.
        Requires owner role.
      operationId: bulkReplace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Keys are collection names; values are arrays of records
              additionalProperties:
                type: array
                items:
                  type: object
              example:
                individuals:
                  - id: I1
                    type: INDI
                    names: [{value: "João /Silva/"}]
                    sex: M
                    events: []
                families:
                  - id: F1
                    type: FAM
                    husb: I1
                    wife: null
                    children: []
      responses:
        '200':
          description: Collections replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── GEDCOM ────────────────────────────────────────────────────────────────

  /api/trees/{treeId}/gedcom/export:
    parameters:
      - $ref: '#/components/parameters/treeId'
    get:
      tags: [GEDCOM]
      summary: Export tree as GEDCOM 7.0
      operationId: gedcomExport
      security:
        - bearerAuth: []
      responses:
        '200':
          description: GEDCOM 7.0 file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/trees/{treeId}/gedcom/import:
    parameters:
      - $ref: '#/components/parameters/treeId'
    post:
      tags: [GEDCOM]
      summary: Import a GEDCOM file (5.5, 5.5.1 or 7.0)
      description: |
        Parses the uploaded `.ged` file and replaces the tree's individuals, families,
        sources, repositories, multimedia, notes and submitters. Requires owner role.
      operationId: gedcomImport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: GEDCOM .ged file
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  imported:
                    type: object
                    properties:
                      individuals:
                        type: integer
                        example: 342
                      families:
                        type: integer
                        example: 148
                      sources:
                        type: integer
                        example: 56
        '400':
          description: Invalid or missing GEDCOM file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Invitations (tree-scoped) ──────────────────────────────────────────────

  /api/trees/{treeId}/invitations:
    parameters:
      - $ref: '#/components/parameters/treeId'

    get:
      tags: [Invitations]
      summary: List invitations for a tree
      description: Requires owner role.
      operationId: listTreeInvitations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Invitations]
      summary: Send an invitation to an email address
      description: |
        Creates a pending invitation and sends an email. If the invitee already has an
        account, an in-app notification is also created. Requires owner role.
      operationId: sendInvitation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                  example: ana.silva@gmail.com
                role:
                  type: string
                  enum: [writer, reader]
                  example: reader
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: User is already a member or pending invitation exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Invitations (user-scoped) ──────────────────────────────────────────────

  /api/invitations:
    get:
      tags: [Invitations]
      summary: List pending invitations for the authenticated user
      operationId: listMyInvitations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of pending invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/invitations/{id}/accept:
    parameters:
      - $ref: '#/components/parameters/invitationId'
    post:
      tags: [Invitations]
      summary: Accept an invitation
      operationId: acceptInvitation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Invitation accepted; user added as tree member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/invitations/{id}/decline:
    parameters:
      - $ref: '#/components/parameters/invitationId'
    post:
      tags: [Invitations]
      summary: Decline an invitation
      operationId: declineInvitation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Invitation declined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/invitations/by-token/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
        description: Invitation token from the email link
    get:
      tags: [Invitations]
      summary: Get invitation details by token (public)
      description: No authentication required. Used by the invite acceptance page.
      operationId: getInvitationByToken
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Notifications ─────────────────────────────────────────────────────────

  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the authenticated user
      operationId: listNotifications
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Array of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread notification count
      operationId: getUnreadCount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 3
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read
      operationId: markAllRead
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/{id}/read:
    parameters:
      - $ref: '#/components/parameters/notificationId'
    put:
      tags: [Notifications]
      summary: Mark a notification as read
      operationId: markNotificationRead
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/notifications/{id}:
    parameters:
      - $ref: '#/components/parameters/notificationId'
    delete:
      tags: [Notifications]
      summary: Delete a notification
      operationId: deleteNotification
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Admin ─────────────────────────────────────────────────────────────────

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Platform statistics
      description: Requires admin role.
      operationId: adminStats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Aggregate statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: integer
                    example: 42
                  trees:
                    type: integer
                    example: 18
                  collections:
                    type: object
                    additionalProperties:
                      type: integer
                    example:
                      individuals: 3420
                      families: 1480
                      sources: 560
                  logins30d:
                    type: object
                    properties:
                      total:
                        type: integer
                        example: 156
                      successful:
                        type: integer
                        example: 152
                      failed:
                        type: integer
                        example: 4
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: Requires admin role.
      operationId: adminListUsers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/paginationLimit'
        - $ref: '#/components/parameters/paginationOffset'
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/User'
                        - type: object
                          properties:
                            treeCount:
                              type: integer
                              example: 3
                  total:
                    type: integer
                    example: 42
                  limit:
                    type: integer
                    example: 100
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/trees:
    get:
      tags: [Admin]
      summary: List all trees
      description: Requires admin role.
      operationId: adminListTrees
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/paginationLimit'
        - $ref: '#/components/parameters/paginationOffset'
      responses:
        '200':
          description: Paginated list of trees
          content:
            application/json:
              schema:
                type: object
                properties:
                  trees:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Tree'
                        - type: object
                          properties:
                            ownerEmail:
                              type: string
                              format: email
                              example: miguel.bangueses@gmail.com
                            ownerName:
                              type: string
                              example: Miguel Bangueses
                            memberCount:
                              type: integer
                              example: 4
                            individualCount:
                              type: integer
                              example: 342
                  total:
                    type: integer
                    example: 18
                  limit:
                    type: integer
                    example: 100
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/logins:
    get:
      tags: [Admin]
      summary: Login audit log
      description: Requires admin role.
      operationId: adminLoginAudit
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - $ref: '#/components/parameters/paginationOffset'
      responses:
        '200':
          description: Paginated login audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  logins:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        userId:
                          type: string
                          format: uuid
                          nullable: true
                        email:
                          type: string
                          format: email
                        name:
                          type: string
                        ip:
                          type: string
                          example: 192.168.1.50
                        userAgent:
                          type: string
                          example: Mozilla/5.0 ...
                        success:
                          type: boolean
                          example: true
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

# ---------------------------------------------------------------------------
# Reusable responses
# ---------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Token em falta ou inválido

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Sem permissão para executar esta ação

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not found

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Internal server error

# Default security — applied to all operations unless overridden
security:
  - bearerAuth: []
