  # ── Trees ─────────────────────────────────────────────────────────────────

  /api/trees:
    get:
      tags: [Trees]
      summary: List trees the authenticated user has access to
      description: Admins see all trees. Others see only trees they are members of.
      operationId: listTrees
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of trees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tree'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Trees]
      summary: Create a new tree
      description: The authenticated user automatically becomes the owner.
      operationId: createTree
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Família Bangueses
                description:
                  type: string
                  example: Árvore genealógica da família Bangueses desde o século XIX
      responses:
        '201':
          description: Tree created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tree'
        '400':
          description: Name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/trees/{treeId}:
    parameters:
      - $ref: '#/components/parameters/treeId'

    get:
      tags: [Trees]
      summary: Get tree details
      operationId: getTree
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tree details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tree'
        '400':
          description: Invalid treeId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Trees]
      summary: Update tree name or description
      description: Requires owner role (or admin).
      operationId: updateTree
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Família Bangueses-Silva
                description:
                  type: string
      responses:
        '200':
          description: Updated tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tree'
        '400':
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Trees]
      summary: Delete tree and all associated data
      description: Requires owner role. Irreversible.
      operationId: deleteTree
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tree deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

