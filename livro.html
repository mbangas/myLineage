<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>myLineage — Family History Book</title>
  <link rel="stylesheet" href="css/livro.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@latest/css/materialdesignicons.min.css">
  <script src="remote-storage.js"></script>
  <script src="auth.js"></script>
  <script src="family-chart-bundle.js"></script>
  <script src="livro-bundle.js"></script>
</head>
<body class="livro-body">

<!-- Loading overlay -->
<div id="livro-loading">
  <div class="loading-spinner"></div>
  <span>A compilar o livro…</span>
</div>

<!-- Toolbar -->
<div id="livro-toolbar">
  <span class="mdi mdi-book-open-variant" style="font-size:20px;color:#c8a96e;"></span>
  <span class="lbr-title" id="lbrTitle">Family History Book</span>
  <div class="lbr-sep"></div>
  <label style="color:#a08060;font-size:12px;white-space:nowrap;">Pessoa foco:</label>
  <select id="lbrPersonSelect" title="Mudar pessoa foco"></select>
  <div class="lbr-sep"></div>
  <!-- Person search with live filter -->
  <div style="position:relative;display:inline-block;" id="lbrSearchWrap">
    <input id="lbrSearchInput" type="text" placeholder="Pesquisar pessoa…" autocomplete="off"
      title="Ir para página de uma pessoa"
      style="width:180px;padding:3px 28px 3px 8px;border-radius:6px;border:1px solid #5a3a1a;background:#1e150c;color:#e0ccaa;font-size:13px;font-family:Georgia,serif;outline:none;">
    <span class="mdi mdi-magnify" style="position:absolute;right:7px;top:50%;transform:translateY(-50%);color:#a08060;pointer-events:none;font-size:1rem;"></span>
    <div id="lbrSearchDropdown" style="display:none;position:absolute;top:calc(100% + 2px);left:0;min-width:100%;max-height:220px;overflow-y:auto;background:#1a110a;border:1px solid #5a3a1a;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.6);z-index:500;"></div>
  </div>
  <div class="lbr-sep"></div>
  <div style="display:flex;align-items:center;gap:6px;">
    <label style="color:#a08060;font-size:12px;white-space:nowrap;">p.</label>
    <input id="lbrGotoInput" type="number" min="1" title="Ir para página" placeholder="…"
      style="width:52px;padding:3px 6px;border-radius:6px;border:1px solid #5a3a1a;background:#1e150c;color:#e0ccaa;font-size:13px;font-family:Georgia,serif;text-align:center;outline:none;">
    <span id="lbrPageTotal" style="color:#a08060;font-size:12px;white-space:nowrap;">/ …</span>
  </div>
  <div class="lbr-sep"></div>
  <button id="lbrPrintBtn" title="Imprimir / Guardar PDF">
    <span class="mdi mdi-printer"></span> Imprimir
  </button>
  <button id="lbrCloseBtn" title="Fechar livro">
    <span class="mdi mdi-close"></span> Fechar
  </button>
</div>

<!-- Book stage -->
<div id="livro-stage">
  <button id="livro-prev" title="Página anterior"><span class="mdi mdi-chevron-left"></span></button>
  <div id="livro-book-wrap">
    <!-- Pages are injected here by JS -->
  </div>
  <button id="livro-next" title="Próxima página"><span class="mdi mdi-chevron-right"></span></button>
</div>

<!-- Hidden print container populated on print -->
<div id="livro-print-pages"></div>

<script>
// ================================================================
//  FAMILY HISTORY BOOK
//  Assembles a paginated book from the genealogy data and renders
//  it with StPageFlip for realistic page-flip animation.
// ================================================================

(function () {
  'use strict';

  // ── Helpers ────────────────────────────────────────────────────

  /** Parse GEDCOM date strings (e.g. "2 FEB 1962") → year number or null */
  function parseYear(str) {
    if (!str) return null;
    const m = String(str).match(/\b(\d{4})\b/);
    return m ? parseInt(m[1], 10) : null;
  }

  const PT_MONTHS = {
    JAN:'Jan',FEB:'Fev',MAR:'Mar',APR:'Abr',MAY:'Mai',JUN:'Jun',
    JUL:'Jul',AUG:'Ago',SEP:'Set',OCT:'Out',NOV:'Nov',DEC:'Dez'
  };

  /** Format GEDCOM date string for display */
  function fmtDate(str) {
    if (!str) return '–';
    return str.replace(
      /\b(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i,
      m => PT_MONTHS[m.toUpperCase()] || m
    );
  }

  /** Get display name for individual */
  function displayName(ind) {
    if (!ind) return '?';
    const n = ind.names && ind.names[0];
    if (!n) return ind.id || '?';
    const parts = [n.prefix, n.given, n.surname, n.suffix].filter(Boolean);
    return parts.join(' ').trim() || ind.id || '?';
  }

  /** Get surname only */
  function surname(ind) {
    if (!ind) return '';
    const n = ind.names && ind.names[0];
    return (n && n.surname) || '';
  }

  /** Life years string */
  function lifeYears(ind) {
    if (!ind || !ind.events) return '';
    const birt = ind.events.find(e => e.type === 'BIRT');
    const deat = ind.events.find(e => e.type === 'DEAT');
    const by = parseYear(birt && birt.date);
    const dy = parseYear(deat && deat.date);
    if (!by && !dy) return '';
    return (by || '?') + (dy ? ' – ' + dy : ' – ');
  }

  /** Escape HTML */
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /** Resolve note text (may be ID ref or inline string) */
  function resolveNote(DB, noteRef) {
    if (!noteRef) return '';
    if (typeof noteRef === 'string' && noteRef.startsWith('N')) {
      const note = DB.getNote ? DB.getNote(noteRef) : null;
      return note ? note.text || '' : noteRef;
    }
    return String(noteRef);
  }

  /** Gather notes text for individual */
  function gatherNotes(DB, ind) {
    if (!ind || !ind.notes || !ind.notes.length) return '';
    return ind.notes.map(n => resolveNote(DB, n)).filter(Boolean).join('\n\n');
  }

  /** Get event of given type from individual events array */
  function getEvent(ind, type) {
    if (!ind || !ind.events) return null;
    return ind.events.find(e => e.type === type) || null;
  }

  // ── BookCompiler ───────────────────────────────────────────────

  class BookCompiler {
    constructor(DB, rootId) {
      this.DB = DB;
      this.rootId = rootId;
      this.individuals = {};   // id → individual
      this.families = {};      // id → family
      this.familyOrder = [];   // ordered family IDs for chapters
      this.personPageMap = {}; // personId → page index (filled in layout pass)
      this.pages = [];
    }

    /** Load all individuals and families into local maps */
    _loadData() {
      const DB = this.DB;
      // collect all non-deleted individuals
      DB.getIndividuals().forEach(ind => {
        if (!ind.deletedAt) this.individuals[ind.id] = ind;
      });
      // collect all non-deleted families
      DB.getFamilies().forEach(fam => {
        if (!fam.deletedAt) this.families[fam.id] = fam;
      });
    }

    /** BFS to collect all reachable families.
     *  Order: focus-person's own families first, then ancestors, then descendants/collaterals.
     */
    traverseAllGenerations(rootId) {
      const ind = this.individuals[rootId];
      if (!ind) return;

      const visitedFam = new Set();
      const visitedInd = new Set([rootId]);

      // ── Phase 1: root person's own spouse-families come first ──────────
      (ind.fams || []).forEach(famId => {
        if (this.families[famId] && !visitedFam.has(famId)) {
          visitedFam.add(famId);
          this.familyOrder.push(famId);
          const fam = this.families[famId];
          [fam.husb, fam.wife].forEach(sid => {
            if (sid && !visitedInd.has(sid)) visitedInd.add(sid);
          });
          (fam.children || []).forEach(cid => {
            if (!visitedInd.has(cid)) visitedInd.add(cid);
          });
        }
      });

      // ── Phase 2: ancestors (walk up via famc) ──────────────────────────
      const ancestorOrder = [];
      const walkUp = (personId) => {
        const p = this.individuals[personId];
        if (!p || !p.famc) return;
        const fam = this.families[p.famc];
        if (!fam || visitedFam.has(p.famc)) return;
        visitedFam.add(p.famc);
        ancestorOrder.unshift(p.famc); // most-distant ancestors first
        [fam.husb, fam.wife].forEach(pid => {
          if (pid && !visitedInd.has(pid)) {
            visitedInd.add(pid);
            walkUp(pid);
          }
        });
      };
      walkUp(rootId);
      // Prepend ancestors before root's families
      this.familyOrder = [...ancestorOrder, ...this.familyOrder];

      // ── Phase 3: BFS outward — children's families, collaterals ─────────
      // Seed queue with all so-far visited individuals
      const queue = [...visitedInd];
      while (queue.length) {
        const id = queue.shift();
        const person = this.individuals[id];
        if (!person) continue;

        (person.fams || []).forEach(famId => {
          if (!visitedFam.has(famId) && this.families[famId]) {
            visitedFam.add(famId);
            this.familyOrder.push(famId);
            const fam = this.families[famId];
            [fam.husb, fam.wife].forEach(sid => {
              if (sid && !visitedInd.has(sid)) { visitedInd.add(sid); queue.push(sid); }
            });
            (fam.children || []).forEach(cid => {
              if (!visitedInd.has(cid)) { visitedInd.add(cid); queue.push(cid); }
            });
          }
        });
      }

      this.familyOrder = [...new Set(this.familyOrder)];
    }

    // ── Page renderers ─────────────────────────────────────────

    _renderCover() {
      const rootInd = this.individuals[this.rootId];
      const sn = surname(rootInd) || 'Família';

      // Collect all surnames in root person's immediate families
      const surnames = new Set();
      if (rootInd) {
        (rootInd.fams || []).forEach(fid => {
          const fam = this.families[fid];
          if (!fam) return;
          [fam.husb, fam.wife].forEach(sid => {
            const s = surname(this.individuals[sid]);
            if (s) surnames.add(s);
          });
        });
        if (rootInd.famc) {
          const fam = this.families[rootInd.famc];
          if (fam) {
            [fam.husb, fam.wife].forEach(sid => {
              const s = surname(this.individuals[sid]);
              if (s) surnames.add(s);
            });
          }
        }
      }
      if (!surnames.size) surnames.add(sn);

      const familiesList = [...surnames].join(' · ');
      const year = new Date().getFullYear();

      return {
        type: 'cover',
        title: 'Capa',
        html: `
<div class="livro-page-inner">
  <div class="cover-ornament">&#9753;</div>
  <div class="cover-ribbon"></div>
  <div class="cover-title">Family History Book</div>
  <div class="cover-subtitle">Livro de História Familiar</div>
  <div class="cover-ribbon"></div>
  <div class="cover-families">${esc(familiesList)}</div>
  <div class="cover-date">${year}</div>
  <div class="cover-app">produzido com myLineage</div>
</div>`
      };
    }

    _renderBlank() {
      return { type: 'blank', title: '', html: '<div class="livro-page-inner"></div>' };
    }

    _renderToc(tocEntries) {
      const rows = tocEntries.map(e => `
<li>
  <span class="toc-level-${e.level}">${esc(e.title)}</span>
  <span class="toc-leader"></span>
  <span class="toc-num" data-toc-ref="${esc(e.ref || '')}">${e.page || '…'}</span>
</li>`).join('');

      return {
        type: 'toc',
        title: 'Índice',
        html: `<div class="livro-page-inner">
  <div class="section-title">Índice Geral</div>
  <ul class="toc-list">${rows}</ul>
  <div class="livro-page-num left">i</div>
</div>`
      };
    }

    _renderIntro() {
      const intro = (this.DB.getSetting && this.DB.getSetting('bookIntro')) ||
        'Esta obra reúne a história da nossa família — os nascimentos, casamentos, migrações e legados que nos moldaram ao longo das gerações.\n\nAs biografias, fotografias e registos aqui compilados foram organizados a partir dos dados da árvore genealógica e constituem uma memória viva para as gerações futuras.\n\nQue este livro seja motivo de orgulho e identidade para todos os que o folhearem.';

      return {
        type: 'intro',
        title: 'Introdução',
        ref: 'intro',
        html: `<div class="livro-page-inner">
  <div class="section-title">Introdução</div>
  <div class="intro-text">${esc(intro)}</div>
</div>`
      };
    }

    /** Build a static SVG family tree for a family unit */
    _buildFamilySvg(famId) {
      const fam = this.families[famId];
      if (!fam) return '<svg></svg>';

      const BOX_W = 120, BOX_H = 42, RX = 6;
      const COL_GAP = 18, ROW_GAP = 44;

      const husb = this.individuals[fam.husb];
      const wife = this.individuals[fam.wife];
      const children = (fam.children || [])
        .map(id => this.individuals[id]).filter(Boolean).slice(0, 8);

      const parts = [];

      // Grandparent families
      const _famc = (ind) => {
        if (!ind || !ind.famc) return null;
        const fid = Array.isArray(ind.famc) ? ind.famc[0] : ind.famc;
        return fid ? this.families[fid] : null;
      };
      const husbParFam = _famc(husb);
      const wifeParFam = _famc(wife);
      const hasGP = husbParFam || wifeParFam;

      // ── Calculate canvas width ─────────────────────────────────
      const numChildren = children.length;
      const childRowW = numChildren * BOX_W + Math.max(0, numChildren - 1) * COL_GAP;
      const couplePairW = (husb ? BOX_W : 0) + (wife ? BOX_W : 0) + (husb && wife ? COL_GAP * 3 : 0);
      const W = Math.max(couplePairW + 40, childRowW + 40, 320);

      // ── Y positions ────────────────────────────────────────────
      const gpRowY = 12;
      const coupleRowY = hasGP ? gpRowY + BOX_H + ROW_GAP : 12;
      const coupleLineY = coupleRowY + BOX_H / 2;
      const barY = coupleRowY + BOX_H + Math.round(ROW_GAP / 2);
      const childRowY = barY + Math.round(ROW_GAP / 2);
      const H = numChildren ? childRowY + BOX_H + 16 : coupleRowY + BOX_H + 16;

      // ── Couple X positions ─────────────────────────────────────
      const coupleTotalW = (husb ? BOX_W : 0) + (wife ? BOX_W : 0) + (husb && wife ? COL_GAP * 3 : 0);
      const coupleStartX = Math.round((W - coupleTotalW) / 2);
      const hX = coupleStartX;
      const wX = husb ? coupleStartX + BOX_W + COL_GAP * 3 : coupleStartX;

      // ── Grandparent boxes ──────────────────────────────────────
      if (husb && husbParFam) {
        const h = this.individuals[husbParFam.husb];
        const w = this.individuals[husbParFam.wife];
        const lbl = [h && surname(h), w && surname(w)].filter(Boolean).join(' & ') || 'Pais';
        const gpCx = hX + BOX_W / 2;
        const gpX = Math.max(4, gpCx - BOX_W / 2);
        parts.push(this._svgBox(gpX, gpRowY, BOX_W, BOX_H, RX, esc(lbl), '', false));
        parts.push(`<line x1="${gpCx}" y1="${gpRowY + BOX_H}" x2="${hX + BOX_W / 2}" y2="${coupleRowY}" stroke="#c8a96e60" stroke-width="1.5" stroke-dasharray="4,3"/>`);
      }
      if (wife && wifeParFam) {
        const h = this.individuals[wifeParFam.husb];
        const w = this.individuals[wifeParFam.wife];
        const lbl = [h && surname(h), w && surname(w)].filter(Boolean).join(' & ') || 'Pais';
        const gpCx = wX + BOX_W / 2;
        const gpX = Math.min(W - BOX_W - 4, gpCx - BOX_W / 2);
        parts.push(this._svgBox(gpX, gpRowY, BOX_W, BOX_H, RX, esc(lbl), '', false));
        parts.push(`<line x1="${gpCx}" y1="${gpRowY + BOX_H}" x2="${wX + BOX_W / 2}" y2="${coupleRowY}" stroke="#c8a96e60" stroke-width="1.5" stroke-dasharray="4,3"/>`);
      }

      // ── Couple boxes ───────────────────────────────────────────
      if (husb) parts.push(this._svgBox(hX, coupleRowY, BOX_W, BOX_H, RX, esc(displayName(husb)), esc(lifeYears(husb)), true));
      if (wife) parts.push(this._svgBox(wX, coupleRowY, BOX_W, BOX_H, RX, esc(displayName(wife)), esc(lifeYears(wife)), true));

      // ── Marriage horizontal line ────────────────────────────────
      let coupleConnCx = husb ? hX + BOX_W / 2 : wX + BOX_W / 2;
      if (husb && wife) {
        const lineX1 = hX + BOX_W, lineX2 = wX;
        coupleConnCx = Math.round((lineX1 + lineX2) / 2);
        parts.push(`<line x1="${lineX1}" y1="${coupleLineY}" x2="${lineX2}" y2="${coupleLineY}" stroke="#c8a96e" stroke-width="2"/>`);
        const marr = (fam.events || []).find(e => e.type === 'MARR');
        const ml = marr && marr.date ? esc(fmtDate(marr.date)) : '';
        if (ml) {
          parts.push(`<text x="${coupleConnCx}" y="${coupleLineY - 4}" text-anchor="middle" font-size="8" fill="#7a3e1e" opacity="0.9">${ml}</text>`);
        }
      }

      // ── Children connections ────────────────────────────────────
      if (numChildren) {
        const totalChildW = numChildren * BOX_W + Math.max(0, numChildren - 1) * COL_GAP;
        const childStartX = Math.round((W - totalChildW) / 2);
        const childMids = children.map((_, i) => childStartX + i * (BOX_W + COL_GAP) + Math.round(BOX_W / 2));
        const barLeft  = childMids[0];
        const barRight = childMids[childMids.length - 1];
        const barCx    = Math.round((barLeft + barRight) / 2);

        // Vertical line from couple midpoint down to horizontal bar
        parts.push(`<line x1="${coupleConnCx}" y1="${coupleLineY}" x2="${coupleConnCx}" y2="${barY}" stroke="#c8a96e80" stroke-width="1.5"/>`);
        // Horizontal jog to bar center if needed
        if (coupleConnCx !== barCx) {
          parts.push(`<line x1="${coupleConnCx}" y1="${barY}" x2="${barCx}" y2="${barY}" stroke="#c8a96e80" stroke-width="1.5"/>`);
        }
        // Horizontal bar across all children
        if (numChildren > 1) {
          parts.push(`<line x1="${barLeft}" y1="${barY}" x2="${barRight}" y2="${barY}" stroke="#c8a96e80" stroke-width="1.5"/>`);
        }
        // Individual drops and child boxes
        children.forEach((child, i) => {
          const cxBox = childStartX + i * (BOX_W + COL_GAP);
          const mx = childMids[i];
          parts.push(`<line x1="${mx}" y1="${barY}" x2="${mx}" y2="${childRowY}" stroke="#c8a96e80" stroke-width="1.5"/>`);
          parts.push(this._svgBox(cxBox, childRowY, BOX_W, BOX_H, RX, esc(displayName(child)), esc(lifeYears(child)), true));
        });
      }

      return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="Georgia,serif" preserveAspectRatio="xMidYMid meet">${parts.join('')}</svg>`;
    }

    _svgBox(x, y, w, h, rx, name, years, showYears) {
      const shortName = name.length > 20 ? name.slice(0, 19) + '…' : name;
      const yearStr = showYears && years
        ? `<text x="${x+w/2}" y="${y+h-7}" text-anchor="middle" font-size="9" fill="#a0806090">${years}</text>` : '';
      const nameY = showYears && years ? y + h/2 - 1 : y + h/2 + 5;
      return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="none" stroke="#7a4e18" stroke-width="2"/>`
           + `<text x="${x+w/2}" y="${nameY}" text-anchor="middle" font-size="11" font-weight="500" fill="#3c2010">${shortName}</text>`
           + yearStr;
    }

    _renderChapterLeft(famId, chapterNum) {
      const fam = this.families[famId];
      if (!fam) return null;

      const husb = this.individuals[fam.husb];
      const wife = this.individuals[fam.wife];
      const names = [husb && displayName(husb), wife && displayName(wife)].filter(Boolean);
      const heading = names.join(' & ') || `Família ${chapterNum}`;

      const childCount = (fam.children || []).length;
      const marrEv = (fam.events || []).find(e => e.type === 'MARR');
      const marrStr = marrEv ? `Casamento: ${fmtDate(marrEv.date)}${marrEv.place ? ', ' + marrEv.place : ''}` : '';

      const svg = this._buildFamilySvg(famId);

      return {
        type: 'chapter-left',
        title: heading,
        ref: 'fam_' + famId,
        famId,
        html: `<div class="livro-page-inner page-chapter">
  <div class="chapter-heading">${esc(heading)}</div>
  ${marrStr ? `<div class="chapter-years">${esc(marrStr)}</div>` : ''}
  <div class="chapter-divider"></div>
  <div class="tree-svg-wrap" style="flex:1;">${svg}</div>
  ${childCount ? `<div style="font-size:12px;color:#7a3e1e;margin-top:8px;"><strong>${childCount}</strong> filho${childCount!==1?'s':''} registado${childCount!==1?'s':''}</div>` : ''}
</div>`
      };
    }

    /** Render a photo mosaic that fills available vertical space.
     *  @param {string[]} photos - array of src URLs
     *  @param {string}   name   - alt text
     *  @param {Array}    footnotes - [{idx, text}] for photos that have notes
     */
    _renderPhotoMosaic(photos, name, footnotes) {
      if (!photos.length) return '';
      footnotes = footnotes || [];
      const n = photos.length;
      const esc2 = s => esc(s);
      // footnote index set for fast lookup by photo position (1-based)
      const fnSet = new Set(footnotes.map(f => f.idx));

      // Helper: single photo element with given flex sizing + optional footnote superscript
      const img = (src, style, photoIdx) => {
        const badge = fnSet.has(photoIdx)
          ? `<span class="bio-photo-fn-badge">${photoIdx}</span>` : '';
        return `<div style="position:relative;width:100%;height:100%;">${badge}<img src="${esc2(src)}" alt="${esc2(name)}" class="bio-photo-mosaic-img" style="${style}" loading="lazy"/></div>`;
      };

      if (n === 1) {
        return `<div class="bio-photo-mosaic bio-photo-mosaic-1">${img(photos[0], 'width:100%;height:100%;object-fit:contain;', 1)}</div>`;
      }
      if (n === 2) {
        return `<div class="bio-photo-mosaic bio-photo-mosaic-2">
          <div style="flex:1;display:flex;align-items:stretch;">${img(photos[0], 'width:100%;height:100%;object-fit:contain;', 1)}</div>
          <div style="flex:1;display:flex;align-items:stretch;">${img(photos[1], 'width:100%;height:100%;object-fit:contain;', 2)}</div>
        </div>`;
      }
      if (n === 3) {
        return `<div class="bio-photo-mosaic bio-photo-mosaic-3">
          <div style="flex:1.4;display:flex;align-items:stretch;">${img(photos[0], 'width:100%;height:100%;object-fit:contain;', 1)}</div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[1], 'width:100%;height:100%;object-fit:contain;', 2)}</div>
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[2], 'width:100%;height:100%;object-fit:contain;', 3)}</div>
          </div>
        </div>`;
      }
      if (n === 4) {
        return `<div class="bio-photo-mosaic bio-photo-mosaic-4">
          <div style="display:flex;gap:12px;flex:1;min-height:0;">
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[0], 'width:100%;height:100%;object-fit:contain;', 1)}</div>
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[1], 'width:100%;height:100%;object-fit:contain;', 2)}</div>
          </div>
          <div style="display:flex;gap:12px;flex:1;min-height:0;">
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[2], 'width:100%;height:100%;object-fit:contain;', 3)}</div>
            <div style="flex:1;display:flex;align-items:stretch;">${img(photos[3], 'width:100%;height:100%;object-fit:contain;', 4)}</div>
          </div>
        </div>`;
      }
      // 5 or 6
      const first3 = photos.slice(0, 3);
      const rest   = photos.slice(3, 6);
      const row2   = rest.map((p, ri) => `<div style="flex:1;display:flex;align-items:stretch;">${img(p,'width:100%;height:100%;object-fit:contain;', 4 + ri)}</div>`).join('');
      return `<div class="bio-photo-mosaic bio-photo-mosaic-5" style="flex-direction:column;">
        <div style="display:flex;gap:12px;flex:1.4;min-height:0;">${first3.map((p,i) =>
          `<div style="flex:1;display:flex;align-items:stretch;">${img(p,'width:100%;height:100%;object-fit:contain;', i+1)}</div>`
        ).join('')}</div>
        <div style="display:flex;gap:12px;flex:1;min-height:0;">${row2}</div>
      </div>`;
    }

    _renderBioPage(personId, chapterNum, famId) {
      const DB = this.DB;
      const ind = this.individuals[personId];
      if (!ind) return null;

      const name = displayName(ind);
      const years = lifeYears(ind);

      // Vital events
      const birt = getEvent(ind, 'BIRT');
      const bapm = getEvent(ind, 'BAPM');
      const deat = getEvent(ind, 'DEAT');
      const buri = getEvent(ind, 'BURI');
      const occu = ind.events ? ind.events.filter(e => e.type === 'OCCU') : [];
      const resi = ind.events ? ind.events.filter(e => e.type === 'RESI') : [];

      // Notes
      const notes = gatherNotes(DB, ind);

      // Photos with notes
      const photos = [];       // { src, note }
      (ind.multimediaRefs || []).forEach(mid => {
        const mm = DB.getMultimediaItem ? DB.getMultimediaItem(mid) : null;
        if (!mm) return;
        const src = mm.dataUrl || (mm.files && mm.files[0] && mm.files[0].file) || '';
        if (!src) return;
        const noteText = mm.notes && mm.notes.length
          ? mm.notes.map(n => resolveNote(DB, n)).filter(Boolean).join(' ')
          : '';
        photos.push({ src, note: noteText });
      });
      // Photos for first page (up to 4 if there's lots of text, else 6)
      const hasNotes = !!(gatherNotes(DB, ind));
      const photoLimit = (hasNotes || notes.length > 200) ? 4 : 6;
      const photosPage1 = photos.slice(0, photoLimit);
      const photosExtra = photos.slice(photoLimit);  // continuation page photos

      // ── Family relations with {{pg:ID}} placeholders ──────────────────
      // These are resolved to real page numbers after the layout pass.
      const pgRef = (personId) => `<span class="bio-pg-ref" data-pgref="${personId}"></span>`;

      let relations = '';
      if (ind.famc && this.families[ind.famc]) {
        const pfam = this.families[ind.famc];
        const parents = [pfam.husb, pfam.wife].filter(Boolean).map(pid => {
          const p = this.individuals[pid];
          return p ? `${esc(displayName(p))}${pgRef(pid)}` : null;
        }).filter(Boolean);
        if (parents.length) {
          relations += `<div class="bio-relations"><strong>Pais:</strong> ${parents.join(' &amp; ')}</div>`;
        }
      }
      (ind.fams || []).forEach(fid => {
        const sfam = this.families[fid];
        if (!sfam) return;
        const spouseId = sfam.husb === personId ? sfam.wife : sfam.husb;
        const spouse = this.individuals[spouseId];
        if (spouse) {
          const marrEv = (sfam.events || []).find(e => e.type === 'MARR');
          relations += `<div class="bio-relations"><strong>Cônjuge:</strong> ${esc(displayName(spouse))}${pgRef(spouseId)}${marrEv && marrEv.date ? ' <span style="color:#a08060;font-size:11px;">(' + esc(fmtDate(marrEv.date)) + ')</span>' : ''}</div>`;
        }
        const kids = (sfam.children || []).map(c => this.individuals[c]).filter(Boolean);
        if (kids.length) {
          const kidList = kids.map(k => `${esc(displayName(k))}${pgRef(k.id)}`).join(', ');
          relations += `<div class="bio-relations"><strong>Filhos:</strong> ${kidList}</div>`;
        }
      });

      // Bio meta grid
      const metaItems = [
        birt  ? { l: 'Nascimento', v: `${fmtDate(birt.date)}${birt.place ? ', '+birt.place : ''}` } : null,
        bapm  ? { l: 'Baptismo',   v: `${fmtDate(bapm.date)}${bapm.place ? ', '+bapm.place : ''}` } : null,
        deat  ? { l: 'Falecimento',v: `${fmtDate(deat.date)}${deat.place ? ', '+deat.place : ''}` } : null,
        buri  ? { l: 'Sepultamento',v:`${fmtDate(buri.date)}${buri.place ? ', '+buri.place : ''}` } : null,
        ...(occu.map(o => ({ l: 'Profissão', v: `${o.place||''}${o.date?' ('+fmtDate(o.date)+')':''}`.trim() || '–' }))),
        ...(resi.slice(0,2).map(r => ({ l: 'Residência', v: `${r.place||''}${r.date?' ('+fmtDate(r.date)+')':''}`.trim() || '–' }))),
      ].filter(Boolean);

      const metaHtml = metaItems.map(m =>
        `<div class="bio-meta-item"><span class="bio-meta-label">${esc(m.l)}</span><span class="bio-meta-value">${esc(m.v)}</span></div>`
      ).join('');

      // Build photo footnotes for photos that have notes
      const photoFootnotes = [];
      photosPage1.forEach((p, i) => {
        if (p.note) photoFootnotes.push({ idx: i + 1, text: p.note });
      });
      const photoSrcsPage1 = photosPage1.map(p => p.src);
      const photosHtml = this._renderPhotoMosaic(photoSrcsPage1, name, photoFootnotes);

      // Photo height class
      const photoHeightClass = photosPage1.length === 0 ? '' :
        photosPage1.length === 1 ? (hasNotes ? 'photo-h-sm' : 'photo-h-md') :
        hasNotes ? 'photo-h-sm' : 'photo-h-lg';

      const footnotesHtml = photoFootnotes.length
        ? `<div class="bio-photo-footnotes">${photoFootnotes.map(f =>
            `<div class="bio-photo-footnote"><sup>${f.idx}</sup> ${esc(f.text)}</div>`).join('')}</div>` : '';

      return {
        type: 'chapter-right',
        title: name,
        ref: 'ind_' + personId,
        personId,
        famId,
        photosExtra,
        html: `<div class="livro-page-inner page-bio">
  <div class="chapter-heading">${esc(name)}</div>
  ${years ? `<div class="chapter-years">${esc(years)}</div>` : ''}
  <div class="chapter-divider"></div>
  <div class="bio-relations-wrap">${relations}</div>
  ${notes ? `<div class="bio-notes">${esc(notes).replace(/\n/g,'<br/>')}</div>` : ''}
  ${photosHtml ? `<div class="bio-photo-area ${photoHeightClass}">${photosHtml}</div>` : ''}
  ${footnotesHtml}
</div>`
      };
    }

    /** Build a photo continuation page for extra photos that didn't fit */
    _renderPhotoContinuation(personId, extraPhotos, name, pageLabel) {
      const srcs = extraPhotos.map(p => p.src || p);
      const footnotes = extraPhotos.map((p, i) => p.note ? { idx: i + 1, text: p.note } : null).filter(Boolean);
      const photosHtml = this._renderPhotoMosaic(srcs, name, footnotes);
      const footnotesHtml = footnotes.length
        ? `<div class="bio-photo-footnotes">${footnotes.map(f =>
            `<div class="bio-photo-footnote"><sup>${f.idx}</sup> ${esc(f.text)}</div>`).join('')}</div>` : '';
      return {
        type: 'photo-continuation',
        title: name + ' (fotos)',
        personId,
        html: `<div class="livro-page-inner page-bio">
  <div class="chapter-heading">${esc(name)}</div>
  <div class="chapter-years" style="font-style:normal;font-size:11px;">${esc(pageLabel)}</div>
  <div class="chapter-divider"></div>
  <div class="bio-photo-area" style="flex:1;min-height:0;height:auto;">${photosHtml}</div>
  ${footnotesHtml}
</div>`
      };
    }

    _renderIndexGeneral(allPages) {
      const entries = allPages
        .filter(p => p.ref && p.ref.startsWith('ind_') && p.title)
        .map(p => ({ name: p.title, page: p.pageNum || '?' }))
        .sort((a, b) => a.name.localeCompare(b.name, 'pt'));

      const rows = entries.map(e =>
        `<div class="index-entry"><span class="index-name">${esc(e.name)}</span><span class="index-pg">${e.page}</span></div>`
      ).join('');

      return {
        type: 'index-general',
        title: 'Índice de Pessoas',
        ref: 'idx-general',
        html: `<div class="livro-page-inner page-index">
  <div class="section-title">Índice de Pessoas</div>
  <div class="index-cols">${rows}</div>
</div>`
      };
    }

    _renderIndexSurnames(allPages) {
      const map = {};
      allPages
        .filter(p => p.ref && p.ref.startsWith('ind_') && p.personId)
        .forEach(p => {
          const ind = this.individuals[p.personId];
          const sn = surname(ind) || '#';
          if (!map[sn]) map[sn] = [];
          map[sn].push({ name: displayName(ind), page: p.pageNum || '?' });
        });

      const letters = Object.keys(map).sort((a, b) => a.localeCompare(b, 'pt'));
      const rows = letters.map(letter => {
        const names = map[letter].sort((a, b) => a.name.localeCompare(b.name, 'pt'));
        return `<div class="index-letter-group">${esc(letter)}</div>`
             + names.map(n => `<div class="index-entry"><span class="index-name">${esc(n.name)}</span><span class="index-pg">${n.page}</span></div>`).join('');
      }).join('');

      return {
        type: 'index-surnames',
        title: 'Índice de Apelidos',
        ref: 'idx-surnames',
        html: `<div class="livro-page-inner page-index">
  <div class="section-title">Índice de Apelidos</div>
  <div class="index-cols">${rows}</div>
</div>`
      };
    }

    _renderChronology() {
      // Gather all events from all traversed individuals
      const events = [];
      Object.values(this.individuals).forEach(ind => {
        if (!ind || !ind.events) return;
        ind.events.forEach(ev => {
          const year = parseYear(ev.date);
          if (!year) return;
          events.push({
            year,
            type: ev.type,
            date: fmtDate(ev.date),
            place: ev.place || '',
            name: displayName(ind),
          });
        });
        // Also family events
        (ind.fams || []).forEach(fid => {
          const fam = this.families[fid];
          if (!fam) return;
          (fam.events || []).forEach(ev => {
            const year = parseYear(ev.date);
            if (!year) return;
            const husb = this.individuals[fam.husb];
            const wife = this.individuals[fam.wife];
            const names = [husb && surname(husb), wife && surname(wife)].filter(Boolean);
            events.push({
              year,
              type: ev.type,
              date: fmtDate(ev.date),
              place: ev.place || '',
              name: names.join(' & ') || 'Família',
            });
          });
        });
      });

      events.sort((a, b) => a.year - b.year || a.name.localeCompare(b.name, 'pt'));

      // Split into pages of ~30 rows
      const ROWS_PER_PAGE = 30;
      const pages = [];
      for (let start = 0; start < events.length || !pages.length; start += ROWS_PER_PAGE) {
        const slice = events.slice(start, start + ROWS_PER_PAGE);
        const rows = slice.map(e => {
          const typeLabels = { BIRT:'Nascimento', DEAT:'Falecimento', MARR:'Casamento',
            BAPM:'Baptismo', BURI:'Sepultamento', CREM:'Cremação', ADOP:'Adopção',
            OCCU:'Profissão', RESI:'Residência', CHR:'Cristã', EVEN:'Evento', IMMI:'Emigração' };
          const label = typeLabels[e.type] || e.type;
          return `<tr><td class="chrono-year">${e.year}</td><td class="chrono-type">${esc(label)}</td><td>${esc(e.name)}</td><td>${esc(e.date)}</td><td>${esc(e.place)}</td></tr>`;
        }).join('');
        const title = pages.length === 0 ? 'Cronologia' : `Cronologia (cont.)`;
        pages.push({
          type: 'chrono',
          title,
          ref: pages.length === 0 ? 'chrono' : undefined,
          html: `<div class="livro-page-inner page-chrono">
  <div class="section-title">${title}</div>
  <table class="chrono-table">
    <thead><tr><th>Ano</th><th>Tipo</th><th>Pessoa</th><th>Data</th><th>Local</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div>`
        });
      }
      return pages;
    }

    _renderChapterRight(famId, chapterNum) {
      const fam = this.families[famId];
      if (!fam) return null;
      const leadId = fam.husb || fam.wife;
      const lead = this.individuals[leadId];
      if (!lead) {
        return { type: 'chapter-right', title: '', famId, html: '<div class="livro-page-inner"></div>' };
      }
      return this._renderBioPage(leadId, chapterNum, famId);
    }

    /** Returns true if a person has no photos and minimal biographical info */
    _isLeanPerson(ind) {
      if (!ind) return true;
      if (ind.multimediaRefs && ind.multimediaRefs.length) return false;
      const notes = gatherNotes(this.DB, ind);
      if (notes && notes.length > 40) return false;
      const eventCount = (ind.events || []).filter(e =>
        ['BIRT','DEAT','BAPM','BURI','OCCU','RESI'].includes(e.type)
      ).length;
      if (eventCount > 3) return false;
      return true;
    }

    /** Render a compact mini-bio block for lean people (no photos, little info) */
    _renderMiniBioBlock(personId) {
      const DB = this.DB;
      const ind = this.individuals[personId];
      if (!ind) return '';
      const name = displayName(ind);
      const years = lifeYears(ind);
      const birt = getEvent(ind, 'BIRT');
      const deat = getEvent(ind, 'DEAT');
      const bapm = getEvent(ind, 'BAPM');
      const notes = gatherNotes(DB, ind);
      const pgRef = (pid) => `<span class="bio-pg-ref" data-pgref="${pid}"></span>`;
      const items = [
        birt ? `<span class="mini-bio-label">Nasc.</span> ${esc(fmtDate(birt.date))}${birt.place?' — '+esc(birt.place):''}` : null,
        bapm ? `<span class="mini-bio-label">Bapt.</span> ${esc(fmtDate(bapm.date))}${bapm.place?' — '+esc(bapm.place):''}` : null,
        deat ? `<span class="mini-bio-label">Fal.</span> ${esc(fmtDate(deat.date))}${deat.place?' — '+esc(deat.place):''}` : null,
      ].filter(Boolean);
      return `<div class="mini-bio-block" id="mini_${personId}">
  <div class="mini-bio-name">${esc(name)}${years ? ` <span class="mini-bio-years">${esc(years)}</span>` : ''}</div>
  ${items.map(i => `<div class="mini-bio-line">${i}</div>`).join('')}
  ${notes ? `<div class="mini-bio-notes">${esc(notes)}</div>` : ''}
</div>`;
    }

    /** Render the right page for a chapter: lead person's bio + mini-bios for lean spouses/children */
    _renderChapterRightWithMini(famId, chapterNum, leanMemberIds) {
      const fam = this.families[famId];
      if (!fam) return null;
      const leadId = fam.husb || fam.wife;
      const lead = this.individuals[leadId];
      if (!lead) return { type: 'chapter-right', title: '', famId, html: '<div class="livro-page-inner"></div>' };

      const bioPage = this._renderBioPage(leadId, chapterNum, famId);
      if (!leanMemberIds || !leanMemberIds.length) return bioPage;

      // Append mini-bios to the bio page html
      const miniBlocks = leanMemberIds
        .filter(id => id !== leadId)
        .map(id => this._renderMiniBioBlock(id)).filter(Boolean).join('');
      if (!miniBlocks) return bioPage;

      const extraHtml = `<div class="mini-bios-section"><div class="mini-bios-divider">Outros membros da família</div>${miniBlocks}</div>`;
      // Insert mini-bios before the closing outer </div> of the page
      bioPage.html = bioPage.html.replace(/(<\/div>\s*)$/, extraHtml + '$1');
      bioPage.leanIds = leanMemberIds.filter(id => id !== leadId);
      bioPage.leanPeople = leanMemberIds
        .filter(id => id !== leadId)
        .map(id => ({ id, name: displayName(this.individuals[id]) }));
      return bioPage;
    }

    _renderIndexPhotos() {
      const DB = this.DB;
      const entries = [];
      const seenMids = new Set(); // deduplicate photos by multimedia ID
      // Collect all multimedia items that have a photo src
      Object.values(this.individuals).forEach(ind => {
        if (!ind || !ind.multimediaRefs) return;
        ind.multimediaRefs.forEach((mid, idx) => {
          if (seenMids.has(mid)) return; // skip duplicate photo
          const mm = DB.getMultimediaItem ? DB.getMultimediaItem(mid) : null;
          if (!mm) return;
          const src = mm.dataUrl || (mm.files && mm.files[0] && mm.files[0].file) || '';
          if (!src) return;
          seenMids.add(mid);
          const title = (mm.title || mm.files && mm.files[0] && mm.files[0].title) || '';
          const noteText = mm.notes && mm.notes.length
            ? mm.notes.map(n => resolveNote(DB, n)).filter(Boolean).join(' ') : '';
          entries.push({ src, title, noteText, personId: ind.id, personName: displayName(ind) });
        });
      });

      if (!entries.length) return null;

      const rows = entries.map((e, idx) =>
        `<div class="photo-idx-entry">
  <div class="photo-idx-thumb" style="background-image:url('${esc(e.src)}')"></div>
  <div class="photo-idx-info">
    <div class="photo-idx-person">${esc(e.personName)}</div>
    ${e.title ? `<div class="photo-idx-title">${esc(e.title)}</div>` : ''}
    ${e.noteText ? `<div class="photo-idx-note">${esc(e.noteText)}</div>` : ''}
    <span class="bio-pg-ref" data-pgref="${e.personId}"></span>
  </div>
</div>`
      ).join('');

      return {
        type: 'index-photos',
        title: 'Índice de Fotografias',
        ref: 'idx-photos',
        html: `<div class="livro-page-inner page-index">
  <div class="section-title">Índice de Fotografias</div>
  <div class="photo-idx-grid">${rows}</div>
</div>`
      };
    }

    _renderIndicators() {
      const inds = Object.values(this.individuals);
      const fams = Object.values(this.families);
      const total = inds.length;
      const males   = inds.filter(p => p.sex === 'M').length;
      const females = inds.filter(p => p.sex === 'F').length;
      const withPhotos = inds.filter(p => p.multimediaRefs && p.multimediaRefs.length).length;
      const withNotes  = inds.filter(p => p.notes && p.notes.length).length;

      // Birth years
      const birthYears = inds
        .map(p => { const e = (p.events||[]).find(e=>e.type==='BIRT'); return parseYear(e&&e.date); })
        .filter(Boolean).sort((a,b)=>a-b);
      const oldest = birthYears[0];
      const newest = birthYears[birthYears.length-1];
      const generations = (oldest && newest) ? Math.round((newest-oldest)/25) : null;

      // Marriage count
      const marriages = fams.filter(f => (f.events||[]).some(e=>e.type==='MARR')).length;
      // Children average
      const totalChildren = fams.reduce((s,f)=>s+(f.children||[]).length,0);
      const avgChildren = fams.length ? (totalChildren/fams.length).toFixed(1) : '–';

      // Surnames
      const surnames = new Set();
      inds.forEach(p => { const s = surname(p); if (s) surnames.add(s); });

      const row = (label, value) =>
        `<div class="ind-row"><span class="ind-label">${esc(label)}</span><span class="ind-value">${esc(String(value))}</span></div>`;

      return {
        type: 'indicators',
        title: 'Indicadores',
        ref: 'idx-indicators',
        html: `<div class="livro-page-inner page-index">
  <div class="section-title">Indicadores</div>
  <div class="ind-grid">
    <div class="ind-section-head">Pessoas</div>
    ${row('Total de pessoas', total)}
    ${row('Homens', males + (total ? ` (${Math.round(males/total*100)}%)` : ''))}
    ${row('Mulheres', females + (total ? ` (${Math.round(females/total*100)}%)` : ''))}
    ${row('Pessoas com fotografia', withPhotos)}
    ${row('Pessoas com notas biogr\u00e1ficas', withNotes)}
    ${oldest ? row('Nascimento mais antigo', oldest) : ''}
    ${newest ? row('Nascimento mais recente', newest) : ''}
    ${generations ? row('N\u00famero estimado de gera\u00e7\u00f5es', generations) : ''}
    <div class="ind-section-head">Fam\u00edlias</div>
    ${row('Total de fam\u00edlias', fams.length)}
    ${row('Casamentos registados', marriages)}
    ${row('Total de filhos', totalChildren)}
    ${row('M\u00e9dia de filhos por fam\u00edlia', avgChildren)}
    <div class="ind-section-head">Apelidos</div>
    ${row('Apelidos distintos', surnames.size)}
    ${surnames.size ? row('Listagem', [...surnames].sort((a,b)=>a.localeCompare(b,'pt')).slice(0,15).join(', ')) : ''}
  </div>
</div>`
      };
    }
    resolvePgRefs(pages) {
      // Build map: personId → pageNum (also stored on this.personPageMap for post-build use)
      const map = {};
      this.personPageMap = map;
      pages.forEach(p => {
        if (!p) return;
        if (p.ref && p.ref.startsWith('ind_') && p.personId && p.pageNum) {
          map[p.personId] = p.pageNum;
        }
        // Lean people merged into this page also get mapped here
        if (p.leanIds && p.pageNum) {
          p.leanIds.forEach(lid => { map[lid] = p.pageNum; });
        }
      });
      // Replace placeholders in all page HTML strings
      pages.forEach(p => {
        if (!p || !p.html) return;
        // Collect own person IDs for this page (skip self-references)
        const ownIds = new Set();
        if (p.personId) ownIds.add(p.personId);
        if (p.leanIds) p.leanIds.forEach(lid => ownIds.add(lid));
        p.html = p.html.replace(
          /<span class="bio-pg-ref" data-pgref="([^"]+)"><\/span>/g,
          (_, pid) => {
            if (ownIds.has(pid)) return ''; // skip self-references
            const pg = map[pid];
            return pg
              ? `<span class="bio-pg-ref-resolved" title="p. ${pg}"> p.${pg}</span>`
              : '';
          }
        );
      });
    }

    buildPages() {
      this._loadData();
      this.traverseAllGenerations(this.rootId);

      // ── Ensure the focused person's own families appear first ──────
      const _rootFamIds = (this.individuals[this.rootId]?.fams || [])
        .filter(fid => this.families[fid]);
      if (_rootFamIds.length) {
        this.familyOrder = [
          ..._rootFamIds,
          ...this.familyOrder.filter(fid => !_rootFamIds.includes(fid))
        ];
      }

      const pages = [];

      // 0. Cover  (shown alone by StPageFlip showCover)
      pages.push({ ...this._renderCover(), cssClass: 'page-cover' });
      // 1. Blank verso (back of cover)
      pages.push({ ...this._renderBlank(), cssClass: 'page-blank' });
      // 2. Introduction
      pages.push({ ...this._renderIntro(), cssClass: 'page-intro' });

      // Determine which people will be shown as lean mini-bios inside their family's right page,
      // so we can skip their standalone bio pages later.
      // A person is merged ONLY if they are lean AND all of their spouse-families are already
      // handled by another chapter — i.e., they do NOT lead a chapter themselves.
      const chapterLeadIds = new Set();
      this.familyOrder.forEach(famId => {
        const fam = this.families[famId];
        if (!fam) return;
        const leadId = fam.husb || fam.wife;
        if (leadId) chapterLeadIds.add(leadId);
      });

      // For each chapter family, figure out lean members that will be merged
      const mergedPersonIds = new Set(); // these skip standalone bio pages
      const familyLeanMap = {};          // famId → [list of lean member ids to show as mini]

      this.familyOrder.forEach(famId => {
        const fam = this.families[famId];
        if (!fam) return;
        const leadId = fam.husb || fam.wife;
        const leanIds = [];
        // Check spouse
        const spouseId = fam.husb === leadId ? fam.wife : fam.husb;
        if (spouseId) {
          const sp = this.individuals[spouseId];
          if (sp && this._isLeanPerson(sp) && !chapterLeadIds.has(spouseId)) {
            leanIds.push(spouseId);
            mergedPersonIds.add(spouseId);
          }
        }
        // Check children
        (fam.children || []).forEach(cid => {
          const child = this.individuals[cid];
          if (child && this._isLeanPerson(child) && !chapterLeadIds.has(cid)) {
            leanIds.push(cid);
            mergedPersonIds.add(cid);
          }
        });
        if (leanIds.length) familyLeanMap[famId] = leanIds;
      });

      // ── Chapter pages + grouped family bios ─────────────────
      const bioPersonIds = new Set();

      /** Push a bio page + any photo continuations */
      const pushBioPages = (pid, famId) => {
        const bioPage = this._renderBioPage(pid, 0, famId);
        if (!bioPage) return;
        pages.push({ ...bioPage, cssClass: 'page-bio' });
        bioPersonIds.add(pid);
        if (bioPage.photosExtra && bioPage.photosExtra.length) {
          const pChunks = [];
          for (let ci = 0; ci < bioPage.photosExtra.length; ci += 6)
            pChunks.push(bioPage.photosExtra.slice(ci, ci + 6));
          pChunks.forEach((chunk, ci) => {
            pages.push({ ...this._renderPhotoContinuation(
              pid, chunk, bioPage.title,
              `Fotografias (${ci + 2}/${pChunks.length + 1})`
            ), cssClass: 'page-bio' });
          });
        }
      };

      let chapterNum = 0;
      this.familyOrder.forEach(famId => {
        chapterNum++;
        const fam = this.families[famId];
        if (!fam) return;
        const leadId = fam.husb || fam.wife;
        const leanIds = familyLeanMap[famId] || [];

        const left  = this._renderChapterLeft(famId, chapterNum);
        const right = leanIds.length
          ? this._renderChapterRightWithMini(famId, chapterNum, leanIds)
          : this._renderChapterRight(famId, chapterNum);

        if (left)  pages.push({ ...left,  cssClass: 'page-chapter' });
        if (right) {
          pages.push({ ...right, cssClass: 'page-bio' });
          if (right.personId) bioPersonIds.add(right.personId);
          // Photo continuation pages for lead
          if (right.photosExtra && right.photosExtra.length) {
            const chunks = [];
            for (let ci = 0; ci < right.photosExtra.length; ci += 6)
              chunks.push(right.photosExtra.slice(ci, ci + 6));
            chunks.forEach((chunk, ci) => {
              pages.push({ ...this._renderPhotoContinuation(
                right.personId, chunk, right.title,
                `Fotografias (${ci + 2}/${chunks.length + 1})`
              ), cssClass: 'page-bio' });
            });
          }
        }

        // ── Spouse bio immediately after lead ──────────────────
        const spouseId = fam.husb === leadId ? fam.wife : fam.husb;
        if (spouseId && !mergedPersonIds.has(spouseId) && !bioPersonIds.has(spouseId))
          pushBioPages(spouseId, famId);

        // ── Children bios (non-lead, non-lean) ─────────────────
        (fam.children || []).forEach(cid => {
          if (!mergedPersonIds.has(cid) && !bioPersonIds.has(cid) && !chapterLeadIds.has(cid))
            pushBioPages(cid, famId);
        });
      });

      // ── Photo Index ───────────────────────────────────────────
      const idxPhotosIdx = pages.length; pages.push(null); // filled after layout pass

      // ── Indicators ────────────────────────────────────────────
      const idxIndicatorsIdx = pages.length; pages.push(null); // filled after layout pass

      // ── Layout pass: assign page numbers ──────────────────────
      pages.forEach((p, i) => {
        if (p) p.pageNum = i + 1;
      });

      // ── Resolve person page-reference placeholders ────────────
      this.resolvePgRefs(pages);

      // ── Build indexes now that page numbers are known ──────────
      // Create virtual page entries for lean people (merged into host pages) so they appear in indexes
      const virtualEntries = [];
      pages.forEach(p => {
        if (!p || !p.leanPeople) return;
        p.leanPeople.forEach(lp => {
          const ind = this.individuals[lp.id];
          virtualEntries.push({
            type: 'chapter-right',
            ref: 'ind_' + lp.id,
            title: lp.name,
            personId: lp.id,
            pageNum: p.pageNum,
            _virtual: true,
          });
        });
      });
      const allPagesWithVirtual = [...pages.filter(Boolean), ...virtualEntries];

      // ── Build photo index (resolved page numbers now known) ────────
      const photoEntries = [];
      const seenPhotoPersons = new Set();
      Object.values(this.individuals).forEach(ind => {
        if (!ind || !ind.multimediaRefs || !ind.multimediaRefs.length) return;
        const hasSrc = ind.multimediaRefs.some(mid => {
          const mm = this.DB.getMultimediaItem ? this.DB.getMultimediaItem(mid) : null;
          return mm && !!(mm.dataUrl || (mm.files && mm.files[0] && mm.files[0].file));
        });
        if (!hasSrc || seenPhotoPersons.has(ind.id)) return;
        seenPhotoPersons.add(ind.id);
      photoEntries.push({ name: displayName(ind), page: this.personPageMap[ind.id] || '?' });
      });
      photoEntries.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
      const idxPhotosPage = this._renderIndexPhotos(photoEntries);
      if (idxPhotosPage) pages[idxPhotosIdx] = { ...idxPhotosPage, cssClass: 'page-index', pageNum: idxPhotosIdx + 1 };

      // ── Build indicators page ──────────────────────────────────────
      const idxIndicatorsPage = this._renderIndicators();
      if (idxIndicatorsPage) pages[idxIndicatorsIdx] = { ...idxIndicatorsPage, cssClass: 'page-index', pageNum: idxIndicatorsIdx + 1 };

      this.pages = pages.filter(Boolean);
      return this.pages;
    }
  }

  // ── MAIN ────────────────────────────────────────────────────────

  let pageFlip = null;
  let allPages = [];

  function getURLParam(k) {
    return new URLSearchParams(window.location.search).get(k);
  }

  function updateIndicator() {
    if (!pageFlip) return;
    const cp = pageFlip.getCurrentPageIndex() + 1;
    const total = allPages.length;
    const input = document.getElementById('lbrGotoInput');
    if (input) input.value = cp;
    const totalEl = document.getElementById('lbrPageTotal');
    if (totalEl) totalEl.textContent = '/ ' + total;
  }

  function initBook(DB, rootId) {
    const compiler = new BookCompiler(DB, rootId);
    const pages = compiler.buildPages();
    allPages = pages;

    // Populate search dropdown with all bio pages
    _buildSearchIndex(pages);

    // Get root person name for title
    const rootInd = compiler.individuals[rootId];
    const rootName = rootInd ? displayName(rootInd) : '';
    if (rootName) {
      document.getElementById('lbrTitle').textContent = `Family History Book — ${rootName}`;
      document.title = `myLineage — Family History Book — ${rootName}`;
    }

    const container = document.getElementById('livro-book-wrap');
    container.innerHTML = '';

    // Determine page dimensions based on container
    const stageEl = document.getElementById('livro-stage');
    const stageH = stageEl.clientHeight || window.innerHeight - 60;
    const PAGE_H = Math.min(stageH - 30, 780);
    const PAGE_W = Math.round(PAGE_H * 0.707); // A4 ratio

    // Create page elements
    const pageEls = pages.map((pg, i) => {
      const div = document.createElement('div');
      div.className = 'livro-page' + (pg.cssClass ? ' ' + pg.cssClass : '');
      div.innerHTML = pg.html;
      // Add page number footer to non-cover, non-blank pages
      if (pg.type !== 'cover' && pg.type !== 'blank') {
        const pn = document.createElement('div');
        pn.className = 'livro-page-num ' + (i % 2 === 0 ? 'left' : 'right');
        pn.textContent = pg.pageNum || (i + 1);
        div.appendChild(pn);
      }
      container.appendChild(div);
      return div;
    });

    // Initialise StPageFlip
    const PF = window.PageFlip;
    if (!PF) {
      console.error('PageFlip library not loaded');
      return;
    }

    pageFlip = new PF(container, {
      width: PAGE_W,
      height: PAGE_H,
      size: 'fixed',
      drawShadow: true,
      flippingTime: 650,
      usePortrait: false,
      startZIndex: 10,
      autoSize: false,
      showCover: true,
      mobileScrollSupport: true,
      clickEventForward: true,
    });

    pageFlip.loadFromHTML(container.querySelectorAll('.livro-page'));

    pageFlip.on('flip', () => updateIndicator());
    pageFlip.on('changeState', () => updateIndicator());

    updateIndicator();
    document.getElementById('livro-loading').style.display = 'none';
  }

  // ── Person search ─────────────────────────────────────────────
  let _searchIndex = [];   // [{name, pageIdx}]

  function _buildSearchIndex(pages) {
    _searchIndex = [];
    pages.forEach((p, i) => {
      if (p && p.ref && p.ref.startsWith('ind_') && p.title) {
        _searchIndex.push({ name: p.title, pageIdx: i });
      }
      // Also index lean people whose mini-bios are on this page
      if (p && p.leanPeople) {
        p.leanPeople.forEach(lp => {
          _searchIndex.push({ name: lp.name, pageIdx: i });
        });
      }
    });
    _searchIndex.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
  }

  function _initSearch() {
    const input  = document.getElementById('lbrSearchInput');
    const dropdown = document.getElementById('lbrSearchDropdown');
    if (!input || !dropdown) return;

    const showDropdown = (items) => {
      dropdown.innerHTML = '';
      if (!items.length) { dropdown.style.display = 'none'; return; }
      items.forEach(item => {
        const div = document.createElement('div');
        div.textContent = item.name + ' — p.' + (item.pageIdx + 1);
        div.style.cssText = 'padding:6px 12px;cursor:pointer;font-size:13px;color:#e0ccaa;font-family:Georgia,serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
        div.addEventListener('mouseenter', () => div.style.background = '#3a1f0a');
        div.addEventListener('mouseleave', () => div.style.background = '');
        div.addEventListener('mousedown', (e) => {
          e.preventDefault();
          if (pageFlip) pageFlip.turnToPage(item.pageIdx);
          updateIndicator();
          input.value = '';
          dropdown.style.display = 'none';
        });
        dropdown.appendChild(div);
      });
      dropdown.style.display = 'block';
    };

    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      if (!q) { dropdown.style.display = 'none'; return; }
      const matches = _searchIndex.filter(e => e.name.toLowerCase().includes(q)).slice(0, 20);
      showDropdown(matches);
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') { dropdown.style.display = 'none'; input.value = ''; }
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('#lbrSearchWrap')) dropdown.style.display = 'none';
    });
  }

  function populatePersonSelect(DB, currentId) {
    const sel = document.getElementById('lbrPersonSelect');
    sel.innerHTML = '';
    try {
      const all = DB.getIndividuals ? DB.getIndividuals() : [];
      all.filter(i => !i.deletedAt).forEach(ind => {
        const opt = document.createElement('option');
        opt.value = ind.id;
        opt.textContent = displayName(ind) + (lifeYears(ind) ? ' ' + lifeYears(ind) : '');
        if (ind.id === currentId) opt.selected = true;
        sel.appendChild(opt);
      });
    } catch(e) {
      // fallback: leave empty
    }

    sel.addEventListener('change', () => {
      const newId = sel.value;
      if (!newId) return;
      document.getElementById('livro-loading').style.display = 'flex';
      setTimeout(() => {
        if (pageFlip) { try { pageFlip.destroy(); } catch(e){} }
        const container = document.getElementById('livro-book-wrap');
        container.innerHTML = '';
        initBook(DB, newId);
      }, 50);
    });
  }

  // ── Boot ──────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    MLAuth.requireAuth();
    _initSearch();

    const waitDB = setInterval(() => {
      const DB = window.GedcomDB;
      if (!DB) return;
      clearInterval(waitDB);

      const paramId = getURLParam('person');
      let rootId = paramId;
      if (!rootId) {
        try {
          const fp = DB.getSetting('focusedPerson');
          rootId = (fp && fp.id) ? fp.id : null;
        } catch(e) {}
      }
      if (!rootId) {
        // fallback: first individual
        try {
          const all = DB.getIndividuals();
          rootId = all && all[0] && all[0].id;
        } catch(e) {}
      }

      if (!rootId) {
        document.getElementById('livro-loading').querySelector('span').textContent = 'Sem dados disponíveis.';
        return;
      }

      populatePersonSelect(DB, rootId);
      initBook(DB, rootId);
    }, 100);

    // ── Toolbar buttons ────────────────────────────────────────
    document.getElementById('lbrCloseBtn').addEventListener('click', () => window.close());

    document.getElementById('lbrPrintBtn').addEventListener('click', () => {
      // Populate print pages
      const printEl = document.getElementById('livro-print-pages');
      printEl.innerHTML = allPages.map((pg, i) => {
        return `<div class="print-page${pg.cssClass ? ' ' + pg.cssClass : ''}">${pg.html}</div>`;
      }).join('');
      window.print();
    });

    document.getElementById('livro-prev').addEventListener('click', () => {
      if (pageFlip) pageFlip.flipPrev('top');
    });

    document.getElementById('livro-next').addEventListener('click', () => {
      if (pageFlip) pageFlip.flipNext('top');
    });

    // Go-to-page input
    const gotoInput = document.getElementById('lbrGotoInput');
    const doGoto = () => {
      if (!pageFlip) return;
      const n = parseInt(gotoInput.value, 10);
      if (!isFinite(n)) return;
      const idx = Math.max(0, Math.min(allPages.length - 1, n - 1));
      pageFlip.turnToPage(idx);
      updateIndicator();
    };
    gotoInput.addEventListener('keydown', e => { if (e.key === 'Enter') { doGoto(); gotoInput.blur(); } });
    gotoInput.addEventListener('change', doGoto);

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!pageFlip) return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown') { pageFlip.flipNext('top'); e.preventDefault(); }
      if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   { pageFlip.flipPrev('top'); e.preventDefault(); }
    });
  });

})();
</script>
